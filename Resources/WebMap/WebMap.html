<!DOCTYPE html>
<!--
Script Name:        WebMap.html
Script Author:      Kevin Foley, Civil Engineer
Last Modified:      Apr 9, 2018

Description:        WebMap.html provides the HTML code for the station
                    selection tab's webview. It primarily calls the 
                    WebMap.js JavaScript code, and the WebMap.css
                    style code.

-->
<html xmlns="http://www.w3.org/1999/html" lang="en">
    <head>

        <meta charset='utf-8' />
        <title>WebMap</title>
        <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no'>

        <link rel="stylesheet" href='WebMap.css'>
        <link rel="stylesheet" href="MapData/leaflet-v1.9.4/dist/leaflet.css">
        <link rel="stylesheet" href='MapData/leaflet-shades/leaflet-shades.css'>
        <link rel='stylesheet' href='leaflet.groupedlayercontrol.min.css'>

        <script src="MapData/leaflet-v1.9.4/dist/leaflet.js"></script>
        <script src='MapData/leaflet-shades/leaflet-shades.js'></script>
        <script src='leaflet.groupedlayercontrol.min.js'></script>
        <script async src="MapData/esri-leaflet-v3.0.19/esri-leaflet.js"></script>
        <script async src="MapData/topojson-v3.0.2/topojson.min.js"></script>
    
    </head>

    <style>
        .dropdown-check-list {
            display: inline-block;
            min-width: 200px;
            margin:0;
            padding:0;
        }
        .dropdown-check-list .anchor_HUC {
            position: relative;
            cursor: pointer;
            display: inline-block;
            min-width: 220px;
            padding: 5px 50px 5px 10px;
            border: 1px solid #ccc;
        }
        .dropdown-check-list .anchor_HUC:after {
            position: absolute;
            content: "";
            border-left: 2px solid black;
            border-top: 2px solid black;
            padding: 5px;
            right: 10px;
            top: 20%;
            -moz-transform: rotate(-135deg);
            -ms-transform: rotate(-135deg);
            -o-transform: rotate(-135deg);
            -webkit-transform: rotate(-135deg);
            transform: rotate(-135deg);
        }
        .dropdown-check-list .anchor_HUC:active:after {
            right: 8px;
            top: 21%;
        }
        .dropdown-check-list ul.items_HUC {
            padding: 2px;
            display: block;
            margin: 0;
            border: 1px solid #ccc;
            border-top: none;
        }
        .dropdown-check-list ul.items_HUC li {
            list-style: none;
        }
        .info {
            padding: 6px 8px;
            font: 14px Open Sans, sans-serif;
            background: white;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 5px;
        }
        h5 {
            padding:0;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 10px;
            color:black;
            display:inline;
        }
        .info h4 {
            margin: 0 0 5px;
            color: rgb(75, 75, 75);
        }
        .legend {
            line-height: 18px;
            color: rgb(59, 59, 59);
        }
        .legend i {
            box-shadow: inset 0 0 0 1px rgb(37, 37, 37);
            font-size: 10px;
            width: 3.0em;
            height: 18px;
            float: left;
            margin-right: 0;
            opacity: 0.9;
        }
        .leaflet-control-layers-expanded {
            font-family: Open Sans, Arial, san-serif, sans-serif;
        }
    </style>

    <body>

        <script type="text/javascript">
            document.addEventListener('DOMContentLoaded', () => {
                console.log(window.location.pathname);
                console.log('DOM fully loaded and parsed');
            });
        </script>

        <div id='map'></div>
        <script src='WebMap2.js'></script>

    </body>

</html>
